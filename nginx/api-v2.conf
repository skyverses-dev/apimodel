# ============================================
# api-v2.itera102.cloud — 2brain v2
# Next.js app (port 3612) + API proxy (/v1/* → ezaiapi.com)
#
# Setup:
#   sudo cp nginx/api-v2.conf /etc/nginx/sites-available/api-v2
#   sudo ln -s /etc/nginx/sites-available/api-v2 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api-v2.itera102.cloud
# ============================================

server {
    listen 80;
    server_name api-v2.itera102.cloud;

    # ---- API Proxy: /v1/* → ezaiapi.com ----
    location /v1/ {
        proxy_pass https://ezaiapi.com/v1/;
        proxy_ssl_server_name on;

        # Set Host to target
        proxy_set_header Host ezaiapi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass all headers (x-api-key, anthropic-version, etc)
        proxy_pass_request_headers on;

        # Streaming (SSE) support
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # AI requests can be slow
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 300s;
    }

    # ---- Next.js App: everything else → port 3612 ----
    location / {
        proxy_pass http://127.0.0.1:3612;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
