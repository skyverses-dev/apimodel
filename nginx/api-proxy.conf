# ============================================
# Nginx Reverse Proxy: api.yourdomain.com → ezaiapi.com
# 
# Put this in: /etc/nginx/sites-available/api-proxy
# Then: ln -s /etc/nginx/sites-available/api-proxy /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# ============================================

server {
    listen 80;
    server_name api.yourdomain.com;  # ← Change to your domain

    # Optional: redirect to HTTPS
    # return 301 https://$host$request_uri;

    location / {
        # Forward all requests to EzAI
        proxy_pass https://ezaiapi.com;
        proxy_ssl_server_name on;

        # Pass original headers
        proxy_set_header Host ezaiapi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through all request headers (x-api-key, anthropic-version, etc)
        proxy_pass_request_headers on;

        # Streaming support (SSE)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts for long-running AI requests
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 300s;

        # CORS (optional — enable if needed)
        # add_header Access-Control-Allow-Origin *;
        # add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        # add_header Access-Control-Allow-Headers 'x-api-key, anthropic-version, content-type, authorization';
    }
}

